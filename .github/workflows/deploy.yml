name: Deploy OpenCinema

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  AWS_REGION: eu-west-2
  S3_FRONTEND: opencinema-frontend-716171483364
  S3_DATA: opencinema-data-716171483364
  CF_DIST_ID: ETGPZG6ZBTA6H

permissions:
  id-token: write
  contents: read

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(join(github.event.commits.*.modified, ','), 'frontend/')
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Sync to S3
        run: aws s3 sync frontend/out/ s3://$S3_FRONTEND/ --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CF_DIST_ID \
            --paths "/*"

  deploy-backend:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(join(github.event.commits.*.modified, ','), 'backend/')
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Package Lambda
        run: |
          pip install -r backend/requirements.txt -t package/
          cp -r backend/ package/backend/
          cd package && zip -r ../lambda.zip .

      - name: Deploy API Lambda
        run: |
          aws lambda update-function-code \
            --function-name opencinema-api \
            --zip-file fileb://lambda.zip

      - name: Deploy Scraper Lambda
        run: |
          aws lambda update-function-code \
            --function-name opencinema-scraper \
            --zip-file fileb://lambda.zip
